<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM-Xiangqi 3D</title>
  
  <!-- 样式 -->
  <link rel="stylesheet" href="css/style.css">
  
  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body>
  <div id="app">
    <!-- 3D 画布区域 -->
    <div id="canvas-container">
      <canvas id="game-canvas"></canvas>
      
      <!-- 工具栏 -->
      <div id="toolbar">
        <button class="toolbar-btn" id="btn-reset-camera">📷 重置视角</button>
        <button class="toolbar-btn" id="btn-toggle-sound">🔊 音效</button>
        <button class="toolbar-btn" id="btn-help">❓ 帮助</button>
      </div>
      
      <!-- 渲染器信息 -->
      <div id="renderer-info">
        <span class="renderer-badge">初始化中...</span>
      </div>
      
      <!-- 加载动画 -->
      <div id="loading">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在初始化 3D 引擎...</div>
        <div class="loading-subtext">请稍候</div>
      </div>
      
      <!-- 游戏结果 -->
      <div id="game-result" class="game-result">
        <div class="result-title">游戏结束</div>
        <div class="result-text">-</div>
        <div class="result-reason">-</div>
      </div>
      
      <!-- 错误提示 -->
      <div id="error-message"></div>
    </div>
    
    <!-- 分隔条 -->
    <div id="resizer"></div>
    
    <!-- 侧边栏 -->
    <div id="side-panel">
      <!-- 连接状态 -->
      <div>
        <div class="panel-title">🔗 连接状态</div>
        <div class="connection-status">
          <span class="status-badge disconnected" id="connection-status">已断开</span>
        </div>
      </div>
      
      <!-- 回合信息 -->
      <div id="turn-info">等待游戏开始...</div>
      
      <!-- 玩家信息 -->
      <div>
        <div class="panel-title">🎮 对战双方</div>
        <div class="player-card red" id="red-player">
          <div class="player-name">红方</div>
          <div class="player-model">-</div>
        </div>
        <div class="player-card black" id="black-player">
          <div class="player-name">黑方</div>
          <div class="player-model">-</div>
        </div>
      </div>
      
      <!-- 配置区域 -->
      <div class="config-section">
        <div class="panel-title">⚙️ 配置</div>
        
        <div class="agent-config">
          <div class="agent-title red">🔴 红方</div>
          <div class="provider-presets" data-agent="red">
            <button class="preset-btn" data-provider="deepseek">DeepSeek</button>
            <button class="preset-btn" data-provider="mimo">MiMo</button>
            <button class="preset-btn" data-provider="minimax">MiniMax</button>
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="red-api-key" placeholder="sk-...">
          </div>
          <div class="form-group">
            <label>Model</label>
            <input type="text" id="red-model" placeholder="deepseek-chat">
          </div>
          <div class="form-group">
            <label>Base URL</label>
            <input type="text" id="red-base-url" placeholder="https://api.deepseek.com">
          </div>
        </div>
        
        <div class="agent-config">
          <div class="agent-title black">⚫ 黑方</div>
          <div class="provider-presets" data-agent="black">
            <button class="preset-btn" data-provider="deepseek">DeepSeek</button>
            <button class="preset-btn" data-provider="mimo">MiMo</button>
            <button class="preset-btn" data-provider="minimax">MiniMax</button>
          </div>
          <div class="form-group">
            <label>API Key</label>
            <input type="password" id="black-api-key" placeholder="sk-...">
          </div>
          <div class="form-group">
            <label>Model</label>
            <input type="text" id="black-model" placeholder="deepseek-chat">
          </div>
          <div class="form-group">
            <label>Base URL</label>
            <input type="text" id="black-base-url" placeholder="https://api.deepseek.com">
          </div>
        </div>
        
        <button class="btn btn-start" id="start-btn">🚀 启动游戏</button>
        <button class="btn btn-stop" id="stop-btn" style="display:none">⏹ 停止</button>
        <button class="btn btn-swap" id="swap-btn">🔄 互换双方配置</button>
        <button class="btn btn-reset" id="reset-btn">🆕 还原棋盘开始新的对局</button>
      </div>
      
      <!-- 走步历史 -->
      <div class="history-section">
        <div class="panel-title">📜 走步记录</div>
        <div id="move-history">暂无走步记录</div>
      </div>
      
      <!-- AI 日志面板 -->
      <div class="ai-log-section">
        <div class="panel-title">💬 AI对话日志</div>
        <div class="ai-log-header red" id="red-log-header">
          <span>🔴 红方日志</span>
          <span id="red-log-toggle">▼</span>
        </div>
        <div class="ai-log-content" id="red-log-content"></div>
        
        <div class="ai-log-header black" id="black-log-header" style="margin-top:8px;">
          <span>⚫ 黑方日志</span>
          <span id="black-log-toggle">▼</span>
        </div>
        <div class="ai-log-content" id="black-log-content"></div>
      </div>
      
      <!-- 控制按钮 -->
      <div class="controls-section">
        <div class="control-buttons">
          <button class="control-btn" id="btn-reset-camera-panel">
            <span>📷</span> 重置视角
          </button>
          <button class="control-btn" id="btn-toggle-sound-panel">
            <span>🔊</span> 音效
          </button>
        </div>
        <div class="volume-control">
          <label for="volume-slider">音量</label>
          <input type="range" id="volume-slider" min="0" max="100" value="50">
        </div>
      </div>
    </div>
  </div>
  
  <!-- JavaScript 模块 -->
  <script src="js/MoveAnimator.js"></script>
  <script src="js/ParticleSystem.js"></script>
  <script src="js/SoundManager.js"></script>
  <script src="js/SceneManager.js"></script>
  <script src="js/WebSocketClient.js"></script>
  <script src="js/GameStateManager.js"></script>
  <script src="js/CompatibilityChecker.js"></script>
  
  <script>
    // ============================================
    // 应用主逻辑
    // ============================================
    
    // Provider 预设
    const PRESETS = {
      deepseek: { model: 'deepseek-chat', baseUrl: 'https://api.deepseek.com' },
      mimo: { model: 'mimo-v2-flash', baseUrl: 'https://api.xiaomimimo.com/v1' },
      minimax: { model: 'MiniMax-M2.7', baseUrl: 'https://api.minimax.chat/v1' },
    };
    
    // 全局变量
    let sceneManager = null;
    let stateManager = null;
    let wsClient = null;
    let gameRunning = false;
    let soundEnabled = true;
    
    // AI 日志
    let redLogs = [];
    let blackLogs = [];
    
    // ============================================
    // 初始化
    // ============================================
    
    async function init() {
      // 检查兼容性
      const checkResult = CompatibilityChecker.check();
      if (!checkResult.supported) {
        CompatibilityChecker.showErrorPage(checkResult.errors);
        return;
      }
      
      // 隐藏加载动画
      const hideLoading = () => {
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          setTimeout(() => loading.style.display = 'none', 300);
        }
      };
      
      try {
        // 初始化场景
        await initScene();
        
        // 初始化组件
        initComponents();
        
        // 初始化配置
        initConfig();
        
        // 设置分隔条
        setupResizer();
        
        // 隐藏加载动画
        hideLoading();
        
        console.info('[App] Initialized successfully');
      } catch (error) {
        console.error('[App] Init failed:', error);
        hideLoading();
        showError('初始化失败: ' + error.message);
      }
    }
    
    // 初始化 3D 场景
    async function initScene() {
      const canvas = document.getElementById('game-canvas');
      const container = document.getElementById('canvas-container');
      
      // 等待布局稳定
      await new Promise(resolve => requestAnimationFrame(resolve));
      await new Promise(resolve => setTimeout(resolve, 50));
      
      // 获取实际的像素尺寸
      const width = Math.floor(container.clientWidth);
      const height = Math.floor(container.clientHeight);
      
      console.info('[Scene] Canvas container size:', width, 'x', height);
      
      // 设置画布像素尺寸
      canvas.width = width;
      canvas.height = height;
      
      // 创建场景管理器
      sceneManager = new SceneManager(canvas, {
        shadowMapSize: 2048,
        cameraPosition: [8, 12, 12],
        lightFollowsCamera: false,
      });
      
      await sceneManager.init();
      
      // 显示渲染器信息
      const rendererInfo = document.getElementById('renderer-info');
      if (rendererInfo) {
        rendererInfo.innerHTML = `<span class="renderer-badge ${sceneManager.rendererType}">渲染器: ${sceneManager.rendererType.toUpperCase()}</span>`;
      }
      
      // 初始化游戏状态管理器
      stateManager = new GameStateManager();
      stateManager.addListener((type, data) => {
        console.debug('[App] State change:', type, data);
      });
    }
    
    // 初始化组件
    function initComponents() {
      // 重置相机按钮
      document.getElementById('btn-reset-camera').addEventListener('click', () => {
        if (sceneManager) sceneManager.resetCamera();
      });
      document.getElementById('btn-reset-camera-panel').addEventListener('click', () => {
        if (sceneManager) sceneManager.resetCamera();
      });
      
      // 音效切换
      document.getElementById('btn-toggle-sound').addEventListener('click', toggleSound);
      document.getElementById('btn-toggle-sound-panel').addEventListener('click', toggleSound);
      
      // 帮助按钮
      document.getElementById('btn-help').addEventListener('click', showHelp);
      
      // 音量滑块
      document.getElementById('volume-slider').addEventListener('input', (e) => {
        const volume = parseInt(e.target.value) / 100;
        if (sceneManager && sceneManager.sounds) {
          sceneManager.sounds.setVolume(volume);
        }
      });
      
      // 预设按钮
      document.querySelectorAll('.preset-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          const agent = e.target.closest('.provider-presets').dataset.agent;
          const provider = e.target.dataset.provider;
          const preset = PRESETS[provider];
          
          document.querySelectorAll(`.provider-presets[data-agent="${agent}"] .preset-btn`).forEach(b => {
            b.classList.toggle('active', b.dataset.provider === provider);
          });
          
          document.getElementById(`${agent}-model`).value = preset.model;
          document.getElementById(`${agent}-base-url`).value = preset.baseUrl;
        });
      });
      
      // 启动/停止按钮
      document.getElementById('start-btn').addEventListener('click', startGame);
      document.getElementById('stop-btn').addEventListener('click', stopGame);
      
      // 互换配置按钮
      document.getElementById('swap-btn').addEventListener('click', swapAgents);
      
      // 重置游戏按钮
      document.getElementById('reset-btn').addEventListener('click', resetGame);
      
      // AI 日志面板
      document.getElementById('red-log-header').addEventListener('click', () => toggleLogPanel('red'));
      document.getElementById('black-log-header').addEventListener('click', () => toggleLogPanel('black'));
      
      // 键盘快捷键
      window.addEventListener('keydown', (e) => {
        switch (e.key.toLowerCase()) {
          case 'r':
            if (sceneManager) sceneManager.resetCamera();
            break;
          case 'm':
            toggleSound();
            break;
        }
      });
      
      // 窗口大小变化
      window.addEventListener('resize', () => {
        const canvas = document.getElementById('game-canvas');
        const container = document.getElementById('canvas-container');
        if (canvas && container && sceneManager) {
          canvas.width = container.clientWidth;
          canvas.height = container.clientHeight;
          sceneManager._handleResize();
        }
      });
    }
    
    // 初始化配置
    async function initConfig() {
      if (window.electronAPI) {
        try {
          const config = await window.electronAPI.getConfig();
          if (config.redModel) document.getElementById('red-model').value = config.redModel;
          if (config.redBaseUrl) document.getElementById('red-base-url').value = config.redBaseUrl;
          if (config.blackModel) document.getElementById('black-model').value = config.blackModel;
          if (config.blackBaseUrl) document.getElementById('black-base-url').value = config.blackBaseUrl;
          
          if (config.hasApiKeys) {
            document.getElementById('red-api-key').placeholder = '已保存（加密存储）';
            document.getElementById('black-api-key').placeholder = '已保存（加密存储）';
          }
        } catch (e) {
          console.error('加载配置失败:', e);
        }
      }
    }
    
    // ============================================
    // 游戏控制
    // ============================================
    
    async function startGame() {
      const redKey = document.getElementById('red-api-key').value.trim();
      const blackKey = document.getElementById('black-api-key').value.trim();
      
      if (!redKey || !blackKey) {
        showError('请填写 API Key');
        return;
      }
      
      // 保存配置
      if (window.electronAPI) {
        try {
          await window.electronAPI.saveConfig({
            redApiKey: redKey,
            redModel: document.getElementById('red-model').value,
            redBaseUrl: document.getElementById('red-base-url').value,
            blackApiKey: blackKey,
            blackModel: document.getElementById('black-model').value,
            blackBaseUrl: document.getElementById('black-base-url').value,
          });
        } catch (e) {
          console.error('保存配置失败:', e);
        }
      }
      
      // 连接 WebSocket
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      wsClient = new WebSocketClient(`${protocol}//${window.location.host}/ws`);
      
      wsClient.onOpen = () => {
        updateConnectionStatus('connected');
        
        wsClient.send({
          type: 'start_game',
          config: {
            red: {
              apiKey: redKey,
              model: document.getElementById('red-model').value || 'deepseek-chat',
              baseUrl: document.getElementById('red-base-url').value || 'https://api.deepseek.com',
              temperature: 0.7,
              maxTokens: 2048,
            },
            black: {
              apiKey: blackKey,
              model: document.getElementById('black-model').value || 'deepseek-chat',
              baseUrl: document.getElementById('black-base-url').value || 'https://api.deepseek.com',
              temperature: 0.7,
              maxTokens: 2048,
            },
          },
        });
      };
      
      wsClient.onMessage = handleMessage;
      wsClient.onClose = () => {
        updateConnectionStatus('disconnected');
        gameRunning = false;
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
      };
      wsClient.onError = (err) => {
        console.error('[WS] Error:', err);
        showError('连接失败');
      };
      wsClient.onStateChange = (state) => {
        updateConnectionStatus(state);
      };
      
      wsClient.connect();
      
      gameRunning = true;
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('stop-btn').style.display = 'block';
      
      // 重置日志
      redLogs = [];
      blackLogs = [];
      document.getElementById('red-log-content').innerHTML = '';
      document.getElementById('black-log-content').innerHTML = '';
    }
    
    function stopGame() {
      if (wsClient) {
        wsClient.close();
        wsClient = null;
      }
      gameRunning = false;
      document.getElementById('start-btn').style.display = 'block';
      document.getElementById('stop-btn').style.display = 'none';
    }
    
      // ============================================
      // 消息处理
      // ============================================
      
      function handleMessage(message) {
        console.debug('[App] Message:', message.type);
        
        switch (message.type) {
          case 'game.init':
            handleGameInit(message.payload);
            break;
          case 'game.move':
            handleGameMove(message.payload);
            break;
          case 'game.game_over':
            handleGameOver(message.payload);
            break;
          case 'game.ai_log':
            handleAILog(message.payload);
            break;
          case 'server.error':
            handleServerError(message.payload);
            break;
        }
      }
      
      /**
       * 处理 AI 日志消息
       */
      function handleAILog(data) {
        const color = data.color === 'Red' ? 'red' : 'black';
        addAILog(color, data.text, data.type);
      }
      
      /**
       * 添加 AI 日志到面板
       * @param {string} color - 'red' 或 'black'
       * @param {string} text - 日志文本
       * @param {string} type - 'prompt' 或 'response'
       */
      function addAILog(color, text, type = 'response') {
        const content = document.getElementById(`${color}-log-content`);
        const logEl = document.createElement('div');
        logEl.className = `ai-log-entry ${type}`;
        
        const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        const prefix = type === 'prompt' ? '📤 系统' : '📥 AI回复';
        
        logEl.innerHTML = `<span class="log-time">${time}</span><span class="log-prefix">${prefix}</span><pre class="log-text">${escapeHtml(text)}</pre>`;
        
        content.appendChild(logEl);
        
        // 自动滚动到底部
        content.scrollTop = content.scrollHeight;
        
        // 保存到日志数组
        if (color === 'red') {
          redLogs.push({ text, type, time });
        } else {
          blackLogs.push({ text, type, time });
        }
      }
      
      /**
       * HTML 转义
       */
      function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
      }
      
      /**
       * 处理游戏初始化
       */
      function handleGameInit(state) {
        // 更新状态管理器
        if (stateManager) {
          stateManager.initFromServer(state);
        }
        
        // 更新 UI
        updateUI(state);
        
        // 更新 3D 场景
        if (sceneManager && stateManager) {
          const layout = stateManager.getBoardLayout();
          sceneManager.updateBoard(layout);
        }
        
        // 更新玩家信息
        if (state.players) {
          updatePlayerInfo('red', state.players.Red);
          updatePlayerInfo('black', state.players.Black);
        }
        
        // 清空历史
        document.getElementById('move-history').textContent = '暂无走步记录';
        
        // 隐藏结果
        document.getElementById('game-result').classList.remove('show');
      }
      
      /**
       * 处理走步消息
       */
      async function handleGameMove(moveData) {
        // 更新状态管理器
        if (stateManager) {
          stateManager.handleMove(moveData);
        }
        
        // 更新 UI
        updateUI({ turn: moveData.turn, turn_number: moveData.turn_number });
        
        // 更新走步历史
        if (stateManager) {
          document.getElementById('move-history').textContent = stateManager.formatMoveHistory();
        }
        
        // 3D 动画
        if (sceneManager && moveData.from_pos && moveData.to_pos) {
          sceneManager.highlightLastMove(moveData.from_pos, moveData.to_pos);
          await sceneManager.movePiece(moveData.from_pos, moveData.to_pos, 0.5, !!moveData.captured);
        }
      }
      
      /**
       * 处理游戏结束
       */
      function handleGameOver(gameOverData) {
        if (stateManager) {
          stateManager.handleGameOver(gameOverData);
        }
        
        // 显示结果
        const resultMap = {
          'red_win': '红方胜利',
          'black_win': '黑方胜利',
          'draw': '平局',
        };
        
        const resultEl = document.getElementById('game-result');
        resultEl.querySelector('.result-text').textContent = resultMap[gameOverData.result] || gameOverData.result;
        resultEl.querySelector('.result-reason').textContent = gameOverData.result_reason || '';
        resultEl.classList.add('show');
        
        document.getElementById('turn-info').textContent = '🏁 游戏结束';
        
        // 播放结束音效
        if (sceneManager && sceneManager.sounds) {
          sceneManager.sounds.playGameOver();
        }
        
        gameRunning = false;
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
      }
      
      /**
       * 处理服务器错误
       */
      function handleServerError(error) {
        showError(`服务器错误: ${error.message} (${error.code})`);
      }
    
    // ============================================
    // UI 更新
    // ============================================
    
    function updateUI(state) {
      if (!stateManager) return;
      
      // 回合信息
      const turnText = stateManager.getTurnDisplay();
      document.getElementById('turn-info').textContent = turnText;
      
      // 玩家高亮
      const isRedTurn = stateManager.turn === 'Red';
      document.getElementById('red-player').classList.toggle('active', isRedTurn && gameRunning);
      document.getElementById('black-player').classList.toggle('active', !isRedTurn && gameRunning);
    }
    
    function updatePlayerInfo(color, player) {
      const el = document.getElementById(`${color}-player`);
      el.querySelector('.player-name').textContent = player.name || (color === 'red' ? '红方' : '黑方');
      el.querySelector('.player-model').textContent = player.model || '-';
    }
    
    function updateConnectionStatus(status) {
      const statusEl = document.getElementById('connection-status');
      const statusMap = {
        'connected': { text: '已连接', class: 'connected' },
        'disconnected': { text: '已断开', class: 'disconnected' },
        'reconnecting': { text: '重连中...', class: 'reconnecting' },
        'failed': { text: '连接失败', class: 'failed' },
      };
      
      const info = statusMap[status] || { text: status, class: '' };
      statusEl.textContent = info.text;
      statusEl.className = `status-badge ${info.class}`;
    }
    
    // ============================================
    // 辅助函数
    // ============================================
    
    function toggleSound() {
      soundEnabled = !soundEnabled;
      
      const icons = document.querySelectorAll('#btn-toggle-sound span, #btn-toggle-sound-panel span');
      icons.forEach(icon => {
        icon.textContent = soundEnabled ? '🔊' : '🔇';
      });
      
      const buttons = document.querySelectorAll('#btn-toggle-sound, #btn-toggle-sound-panel');
      buttons.forEach(btn => {
        btn.classList.toggle('muted', !soundEnabled);
      });
      
      if (sceneManager && sceneManager.sounds) {
        sceneManager.sounds.setEnabled(soundEnabled);
      }
    }
    
    function showHelp() {
      const helpHtml = `
        <div style="color: #fff; line-height: 1.8;">
          <h3 style="color: #3498db; margin-bottom: 15px;">🎮 控制说明</h3>
          <p><strong>鼠标左键拖拽</strong> - 旋转视角</p>
          <p><strong>鼠标右键拖拽</strong> - 平移视角</p>
          <p><strong>滚轮</strong> - 缩放视角</p>
          <hr style="border-color: #333; margin: 15px 0;">
          <h3 style="color: #3498db; margin-bottom: 10px;">🎯 快捷键</h3>
          <p><strong>R</strong> - 重置相机视角</p>
          <p><strong>M</strong> - 静音/取消静音</p>
          <hr style="border-color: #333; margin: 15px 0;">
          <h3 style="color: #3498db; margin-bottom: 10px;">📝 游戏说明</h3>
          <p>红方先行，双方交替走步。</p>
          <p>AI根据当前局面分析并选择最佳走法。</p>
        </div>
      `;
      
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;';
      overlay.onclick = () => overlay.remove();
      
      const modal = document.createElement('div');
      modal.style.cssText = 'background:#1a1a2e;padding:30px;border-radius:12px;max-width:400px;';
      modal.innerHTML = helpHtml;
      
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }
    
    function swapAgents() {
      if (gameRunning) return;
      
      // 互换 API Key
      const redKey = document.getElementById('red-api-key');
      const blackKey = document.getElementById('black-api-key');
      [redKey.value, blackKey.value] = [blackKey.value, redKey.value];
      
      // 互换 Model
      const redModel = document.getElementById('red-model');
      const blackModel = document.getElementById('black-model');
      [redModel.value, blackModel.value] = [blackModel.value, redModel.value];
      
      // 互换 Base URL
      const redUrl = document.getElementById('red-base-url');
      const blackUrl = document.getElementById('black-base-url');
      [redUrl.value, blackUrl.value] = [blackUrl.value, redUrl.value];
    }
    
    function toggleLogPanel(agent) {
      const content = document.getElementById(`${agent}-log-content`);
      const toggle = document.getElementById(`${agent}-log-toggle`);
      content.classList.toggle('show');
      toggle.textContent = content.classList.contains('show') ? '▲' : '▼';
    }
    
    /**
     * 还原棋盘开始新的对局
     */
    function resetGame() {
      // 如果已连接，发送重置消息到服务器
      if (wsClient && wsClient.ws && wsClient.ws.readyState === WebSocket.OPEN) {
        wsClient.send({ type: 'reset_game' });
        
        // 重置状态管理器
        if (stateManager) {
          stateManager.reset();
        }
        
        // 重置棋盘到初始布局
        if (sceneManager) {
          sceneManager.pieces.forEach((piece) => {
            sceneManager.piecesGroup.remove(piece);
          });
          sceneManager.pieces.clear();
          
          const initialLayout = [
            { position: 'i0', piece: 'R' }, { position: 'h0', piece: 'N' }, { position: 'g0', piece: 'B' },
            { position: 'f0', piece: 'A' }, { position: 'e0', piece: 'K' }, { position: 'd0', piece: 'A' },
            { position: 'c0', piece: 'B' }, { position: 'b0', piece: 'N' }, { position: 'a0', piece: 'R' },
            { position: 'h2', piece: 'C' }, { position: 'd2', piece: 'P' }, { position: 'e2', piece: 'P' },
            { position: 'f5', piece: 'P' }, { position: 'a3', piece: 'P' }, { position: 'c4', piece: 'P' },
            { position: 'e4', piece: 'P' }, { position: 'g4', piece: 'P' }, { position: 'h5', piece: 'P' },
            { position: 'b2', piece: 'C' }, { position: 'a2', piece: 'R' }, { position: 'i9', piece: 'r' },
            { position: 'h9', piece: 'n' }, { position: 'g9', piece: 'b' }, { position: 'f9', piece: 'a' },
            { position: 'e9', piece: 'k' }, { position: 'd9', piece: 'a' }, { position: 'c9', piece: 'b' },
            { position: 'b9', piece: 'n' }, { position: 'a9', piece: 'r' }, { position: 'h7', piece: 'c' },
            { position: 'd7', piece: 'p' }, { position: 'e7', piece: 'p' }, { position: 'f4', piece: 'p' },
            { position: 'a6', piece: 'p' }, { position: 'c5', piece: 'p' }, { position: 'e5', piece: 'p' },
            { position: 'g5', piece: 'p' }, { position: 'h4', piece: 'p' }, { position: 'b7', piece: 'c' },
          ];
          sceneManager.updateBoard(initialLayout);
        }
      } else {
        // 未连接时，仅本地重置
        gameRunning = false;
        
        if (stateManager) {
          stateManager.reset();
        }
        
        if (sceneManager) {
          sceneManager.pieces.forEach((piece) => {
            sceneManager.piecesGroup.remove(piece);
          });
          sceneManager.pieces.clear();
          
          const initialLayout = [
            { position: 'i0', piece: 'R' }, { position: 'h0', piece: 'N' }, { position: 'g0', piece: 'B' },
            { position: 'f0', piece: 'A' }, { position: 'e0', piece: 'K' }, { position: 'd0', piece: 'A' },
            { position: 'c0', piece: 'B' }, { position: 'b0', piece: 'N' }, { position: 'a0', piece: 'R' },
            { position: 'h2', piece: 'C' }, { position: 'd2', piece: 'P' }, { position: 'e2', piece: 'P' },
            { position: 'f5', piece: 'P' }, { position: 'a3', piece: 'P' }, { position: 'c4', piece: 'P' },
            { position: 'e4', piece: 'P' }, { position: 'g4', piece: 'P' }, { position: 'h5', piece: 'P' },
            { position: 'b2', piece: 'C' }, { position: 'a2', piece: 'R' }, { position: 'i9', piece: 'r' },
            { position: 'h9', piece: 'n' }, { position: 'g9', piece: 'b' }, { position: 'f9', piece: 'a' },
            { position: 'e9', piece: 'k' }, { position: 'd9', piece: 'a' }, { position: 'c9', piece: 'b' },
            { position: 'b9', piece: 'n' }, { position: 'a9', piece: 'r' }, { position: 'h7', piece: 'c' },
            { position: 'd7', piece: 'p' }, { position: 'e7', piece: 'p' }, { position: 'f4', piece: 'p' },
            { position: 'a6', piece: 'p' }, { position: 'c5', piece: 'p' }, { position: 'e5', piece: 'p' },
            { position: 'g5', piece: 'p' }, { position: 'h4', piece: 'p' }, { position: 'b7', piece: 'c' },
          ];
          sceneManager.updateBoard(initialLayout);
        }
      }
      
      // 清空走步历史
      document.getElementById('move-history').textContent = '暂无走步记录';
      
      // 隐藏游戏结果弹窗
      document.getElementById('game-result').classList.remove('show');
      
      // 更新 UI
      document.getElementById('turn-info').textContent = '等待游戏开始...';
      
      // 清空 AI 日志
      redLogs = [];
      blackLogs = [];
      document.getElementById('red-log-content').innerHTML = '';
      document.getElementById('black-log-content').innerHTML = '';
      
      console.info('[App] Game reset');
    }
    
    function showError(msg) {
      const el = document.getElementById('error-message');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }
    
    function setupResizer() {
      const resizer = document.getElementById('resizer');
      const sidePanel = document.getElementById('side-panel');
      let isResizing = false;
      
      resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        resizer.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const newWidth = window.innerWidth - e.clientX;
        if (newWidth >= 200 && newWidth <= 600) {
          sidePanel.style.width = newWidth + 'px';
        }
      });
      
      document.addEventListener('mouseup', () => {
        if (isResizing) {
          isResizing = false;
          resizer.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      });
    }
    
    // ============================================
    // 启动应用
    // ============================================
    
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
