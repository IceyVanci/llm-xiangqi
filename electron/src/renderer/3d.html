<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LLM-Xiangqi 3D</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
      background: #1a1a2e;
      color: #fff;
      overflow: hidden;
    }
    
    #app {
      display: flex;
      width: 100vw;
      height: 100vh;
    }
    
    /* 可拖动分隔条 */
    #resizer {
      width: 6px;
      background: rgba(255,255,255,0.1);
      cursor: col-resize;
      transition: background 0.2s;
      flex-shrink: 0;
    }
    #resizer:hover, #resizer.active {
      background: rgba(255,255,255,0.3);
    }
    
    /* 3D 画布区域 */
    #canvas-container {
      flex: 1;
      position: relative;
      min-width: 200px;
    }
    
    #game-canvas {
      width: 100%;
      height: 100%;
    }
    
    /* 顶部工具栏 */
    #toolbar {
      position: absolute;
      top: 10px;
      left: 10px;
      display: flex;
      gap: 10px;
    }
    
    .toolbar-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 8px;
      background: rgba(255,255,255,0.1);
      color: #fff;
      cursor: pointer;
      font-size: 14px;
    }
    
    .toolbar-btn:hover {
      background: rgba(255,255,255,0.2);
    }
    
    /* 渲染器信息 */
    #renderer-info {
      position: absolute;
      top: 10px;
      right: 10px;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 12px;
      background: rgba(0,0,0,0.5);
    }
    
    /* 右侧面板 */
    #side-panel {
      width: 300px;
      background: rgba(0,0,0,0.8);
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
    
    .panel-title {
      font-size: 16px;
      font-weight: bold;
      color: #3498db;
      margin-bottom: 10px;
    }
    
    /* 连接状态 */
    .status-badge {
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
    }
    .status-badge.connected { background: #27ae60; }
    .status-badge.disconnected { background: #e74c3c; }
    .status-badge.reconnecting { background: #f39c12; }
    
    /* 玩家信息 */
    .player-card {
      padding: 12px;
      border-radius: 8px;
      background: rgba(255,255,255,0.05);
      border-left: 4px solid transparent;
    }
    .player-card.red { border-left-color: #e74c3c; }
    .player-card.black { border-left-color: #95a5a6; }
    .player-card.active { background: rgba(255,255,255,0.15); }
    
    .player-name { font-weight: bold; font-size: 14px; }
    .player-model { font-size: 11px; color: #aaa; margin-top: 4px; }
    .player-stats { font-size: 11px; color: #888; margin-top: 4px; }
    
    /* 回合信息 */
    #turn-info {
      font-size: 18px;
      text-align: center;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }
    
    /* 走步历史 */
    #move-history {
      flex: 1;
      overflow-y: auto;
      font-family: monospace;
      font-size: 12px;
      background: #000;
      padding: 10px;
      border-radius: 8px;
      min-height: 100px;
    }
    
    /* 游戏结果 */
    #game-result {
      display: none;
      text-align: center;
      padding: 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 8px;
    }
    #game-result.show { display: block; }
    .result-title { font-size: 20px; font-weight: bold; }
    .result-text { font-size: 24px; color: #f39c12; margin: 10px 0; }
    
    /* 配置区域 */
    .config-section {
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 8px;
    }
    
    .agent-config { margin-bottom: 15px; }
    .agent-title { font-weight: bold; margin-bottom: 8px; }
    .agent-title.red { color: #e74c3c; }
    .agent-title.black { color: #95a5a6; }
    
    .form-group { margin-bottom: 8px; }
    .form-group label { display: block; font-size: 12px; color: #aaa; margin-bottom: 2px; }
    .form-group input, .form-group select {
      width: 100%;
      padding: 6px 10px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.3);
      color: #fff;
      font-size: 12px;
    }
    
    .provider-presets { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 8px; }
    .preset-btn {
      padding: 3px 8px;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.2);
      background: transparent;
      color: #aaa;
      font-size: 11px;
      cursor: pointer;
    }
    .preset-btn:hover, .preset-btn.active {
      border-color: #3498db;
      color: #3498db;
    }
    
    .btn {
      width: 100%;
      padding: 10px;
      border-radius: 6px;
      border: none;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-start { background: linear-gradient(135deg, #27ae60, #2ecc71); color: #fff; }
    .btn-stop { background: linear-gradient(135deg, #e74c3c, #c0392b); color: #fff; }
    .btn-swap { background: linear-gradient(135deg, #3498db, #2980b9); color: #fff; margin-top: 10px; }
    
    /* 错误信息 */
    #error-message {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      padding: 10px 20px;
      background: #e74c3c;
      border-radius: 8px;
      display: none;
      z-index: 1000;
    }
    
    /* AI日志面板 */
    .ai-log-section { margin-top: 10px; }
    .ai-log-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      background: rgba(255,255,255,0.05);
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .ai-log-header:hover { background: rgba(255,255,255,0.1); }
    .ai-log-header.red { border-left: 3px solid #e74c3c; }
    .ai-log-header.black { border-left: 3px solid #95a5a6; }
    .ai-log-content {
      display: none;
      max-height: 150px;
      overflow-y: auto;
      font-size: 11px;
      background: #111;
      padding: 8px;
      border-radius: 0 0 6px 6px;
      white-space: pre-wrap;
      font-family: monospace;
    }
    .ai-log-content.show { display: block; }
  </style>
</head>
<body>
  <div id="app">
    <div id="canvas-container">
      <canvas id="game-canvas"></canvas>
      
      <div id="toolbar">
        <button class="toolbar-btn" id="btn-reset-camera">📷 重置视角</button>
        <button class="toolbar-btn" id="btn-toggle-sound" onclick="toggleSound()">🔊 音效</button>
        <button class="toolbar-btn" id="btn-help" onclick="showHelp()">❓ 帮助</button>
      </div>
      
      <div id="renderer-info">渲染器: 加载中...</div>
    </div>
    
    <div id="resizer"></div>
    
    <div id="side-panel">
      <div>
        <div class="panel-title">🔗 连接状态</div>
        <span class="status-badge disconnected" id="connection-status">已断开</span>
      </div>
      
      <div id="turn-info">等待游戏开始...</div>
      
      <div class="player-card red" id="red-player">
        <div class="player-name">红方</div>
        <div class="player-model">--</div>
        <div class="player-stats" id="red-stats">请求次数: 0</div>
      </div>
      
      <div class="player-card black" id="black-player">
        <div class="player-name">黑方</div>
        <div class="player-model">--</div>
        <div class="player-stats" id="black-stats">请求次数: 0</div>
      </div>
      
      <div id="game-result">
        <div class="result-title">游戏结束</div>
        <div class="result-text"></div>
        <div class="result-reason"></div>
      </div>
      
      <div>
        <div class="panel-title">⚙️ 配置</div>
        
        <div class="config-section">
          <div class="agent-config">
            <div class="agent-title red">🔴 红方</div>
            <div class="provider-presets" data-agent="red">
              <button class="preset-btn" data-provider="deepseek">DeepSeek</button>
              <button class="preset-btn" data-provider="mimo">MiMo</button>
              <button class="preset-btn" data-provider="minimax">MiniMax</button>
            </div>
            <div class="form-group">
              <label>API Key</label>
              <input type="password" id="red-api-key" placeholder="sk-...">
            </div>
            <div class="form-group">
              <label>Model</label>
              <input type="text" id="red-model" placeholder="deepseek-chat">
            </div>
            <div class="form-group">
              <label>Base URL</label>
              <input type="text" id="red-base-url" placeholder="https://api.deepseek.com">
            </div>
          </div>
          
          <div class="agent-config">
            <div class="agent-title black">⚫ 黑方</div>
            <div class="provider-presets" data-agent="black">
              <button class="preset-btn" data-provider="deepseek">DeepSeek</button>
              <button class="preset-btn" data-provider="mimo">MiMo</button>
              <button class="preset-btn" data-provider="minimax">MiniMax</button>
            </div>
            <div class="form-group">
              <label>API Key</label>
              <input type="password" id="black-api-key" placeholder="sk-...">
            </div>
            <div class="form-group">
              <label>Model</label>
              <input type="text" id="black-model" placeholder="deepseek-chat">
            </div>
            <div class="form-group">
              <label>Base URL</label>
              <input type="text" id="black-base-url" placeholder="https://api.deepseek.com">
            </div>
          </div>
          
          <button class="btn btn-start" id="start-btn" onclick="startGame()">🚀 启动游戏</button>
          <button class="btn btn-stop" id="stop-btn" onclick="stopGame()" style="display:none">⏹ 停止</button>
          <button class="btn btn-swap" id="swap-btn" onclick="swapAgents()">🔄 互换双方配置</button>
        </div>
      </div>
      
      <div>
        <div class="panel-title">📜 走步历史</div>
        <div id="move-history">等待走步...</div>
      </div>
      
      <div class="ai-log-section">
        <div class="panel-title">💬 AI对话日志</div>
        <div class="ai-log-header red" onclick="toggleLogPanel('red')">
          <span>🔴 红方日志</span>
          <span id="red-log-toggle">▼</span>
        </div>
        <div class="ai-log-content" id="red-log-content"></div>
        
        <div class="ai-log-header black" onclick="toggleLogPanel('black')" style="margin-top:8px;">
          <span>⚫ 黑方日志</span>
          <span id="black-log-toggle">▼</span>
        </div>
        <div class="ai-log-content" id="black-log-content"></div>
      </div>
    </div>
  </div>
  
  <div id="error-message"></div>
  
  <!-- 加载 Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  
  <script>
    // Provider 预设
    const PRESETS = {
      deepseek: { model: 'deepseek-chat', baseUrl: 'https://api.deepseek.com' },
      mimo: { model: 'mimo-v2-flash', baseUrl: 'https://api.xiaomimimo.com/v1' },
      minimax: { model: 'MiniMax-M2.7', baseUrl: 'https://api.minimax.chat/v1' },
    };
    
    // 棋盘配置
    const BOARD_SIZE = 9;
    const ROW_SIZE = 10;
    const CELL_SIZE = 1;
    const PIECE_RADIUS = 0.35;
    const PIECE_HEIGHT = 0.15;
    
    // 棋子名称
    const PIECE_NAMES = {
      'K': '帅', 'k': '将',
      'A': '士', 'a': '仕',
      'B': '相', 'b': '象',
      'N': '马', 'n': '马',
      'R': '车', 'r': '车',
      'C': '炮', 'c': '炮',
      'P': '兵', 'p': '卒',
    };
    
    // 全局变量
    let scene, camera, renderer;
    let boardGroup, piecesGroup;
    let ws = null;
    let gameRunning = false;
    let moveHistory = [];
    let currentFen = 'rnbakabnr/9/1c5c1/p1p1p1p1p/9/9/P1P1P1P1P/1C5C1/9/RNBAKABNR w';
    let pieces = {};
    
    // 请求计数
    let redRequestCount = 0;
    let blackRequestCount = 0;
    let soundEnabled = true;
    
    // AI日志
    let redLogs = [];
    let blackLogs = [];
    
    // 初始化 3D 场景
    function initScene() {
      const canvas = document.getElementById('game-canvas');
      const container = document.getElementById('canvas-container');
      
      // 场景
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0x1a1a2e);
      
      // 相机
      camera = new THREE.PerspectiveCamera(45, container.clientWidth / container.clientHeight, 0.1, 100);
      camera.position.set(4, 10, 8);
      camera.lookAt(4, 0, 5);
      
      // 渲染器
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.shadowMap.enabled = true;
      
      // 更新渲染器信息
      document.getElementById('renderer-info').textContent = '渲染器: WebGL';
      
      // 灯光
      const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
      scene.add(ambientLight);
      
      const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
      directionalLight.position.set(10, 20, 10);
      directionalLight.castShadow = true;
      scene.add(directionalLight);
      
      // 创建棋盘
      createBoard();
      
      // 窗口调整
      window.addEventListener('resize', onResize);
      
      // 相机控制
      setupCameraControls();
      
      // 开始渲染循环
      animate();
    }
    
    function createBoard() {
      boardGroup = new THREE.Group();
      
      // 棋盘底板
      const boardGeom = new THREE.BoxGeometry(9, 0.2, 10);
      const boardMat = new THREE.MeshPhongMaterial({ color: 0xDEB887 });
      const boardMesh = new THREE.Mesh(boardGeom, boardMat);
      boardMesh.position.set(4, -0.1, 4.5);
      boardMesh.receiveShadow = true;
      boardGroup.add(boardMesh);
      
      // 绘制线条
      const lineMaterial = new THREE.LineBasicMaterial({ color: 0x333333 });
      
      // 横线
      for (let i = 0; i < 10; i++) {
        const points = [new THREE.Vector3(0, 0.01, i), new THREE.Vector3(8, 0.01, i)];
        const geometry = new THREE.BufferGeometry().setFromPoints(points);
        const line = new THREE.Line(geometry, lineMaterial);
        boardGroup.add(line);
      }
      
      // 竖线
      for (let i = 0; i < 9; i++) {
        if (i === 0 || i === 8) {
          const points = [new THREE.Vector3(i, 0.01, 0), new THREE.Vector3(i, 0.01, 9)];
          const geometry = new THREE.BufferGeometry().setFromPoints(points);
          const line = new THREE.Line(geometry, lineMaterial);
          boardGroup.add(line);
        } else {
          const points1 = [new THREE.Vector3(i, 0.01, 0), new THREE.Vector3(i, 0.01, 4)];
          const points2 = [new THREE.Vector3(i, 0.01, 5), new THREE.Vector3(i, 0.01, 9)];
          boardGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points1), lineMaterial));
          boardGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(points2), lineMaterial));
        }
      }
      
      // 九宫格斜线
      const diag1 = [new THREE.Vector3(3, 0.01, 0), new THREE.Vector3(5, 0.01, 2)];
      const diag2 = [new THREE.Vector3(5, 0.01, 0), new THREE.Vector3(3, 0.01, 2)];
      const diag3 = [new THREE.Vector3(3, 0.01, 7), new THREE.Vector3(5, 0.01, 9)];
      const diag4 = [new THREE.Vector3(5, 0.01, 7), new THREE.Vector3(3, 0.01, 9)];
      boardGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(diag1), lineMaterial));
      boardGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(diag2), lineMaterial));
      boardGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(diag3), lineMaterial));
      boardGroup.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(diag4), lineMaterial));
      
      // 炮/兵位置标记
      const markGeom = new THREE.CircleGeometry(0.06, 16);
      const markMat = new THREE.MeshBasicMaterial({ color: 0x333333, side: THREE.DoubleSide });
      
      const marks = [
        [1, 2], [7, 2],  // 红方炮
        [1, 7], [7, 7],  // 黑方炮
        [0, 3], [2, 3], [4, 3], [6, 3], [8, 3],  // 红方兵
        [0, 6], [2, 6], [4, 6], [6, 6], [8, 6],  // 黑方兵
      ];
      
      marks.forEach(([x, z]) => {
        const mark = new THREE.Mesh(markGeom, markMat);
        mark.rotation.x = -Math.PI / 2;
        mark.position.set(x, 0.02, z);
        boardGroup.add(mark);
      });
      
      scene.add(boardGroup);
      piecesGroup = new THREE.Group();
      scene.add(piecesGroup);
    }
    
    function createPiece(piece, col, row) {
      const isRed = piece === piece.toUpperCase();
      const color = isRed ? 0xc0392b : 0x2c3e50;
      
      // 圆柱体
      const geometry = new THREE.CylinderGeometry(PIECE_RADIUS, PIECE_RADIUS * 1.1, PIECE_HEIGHT, 32);
      const material = new THREE.MeshPhongMaterial({ color, shininess: 80 });
      const mesh = new THREE.Mesh(geometry, material);
      
      // 文字
      const canvas = document.createElement('canvas');
      canvas.width = 128;
      canvas.height = 128;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = isRed ? '#c0392b' : '#2c3e50';
      ctx.beginPath();
      ctx.arc(64, 64, 60, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 60px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(PIECE_NAMES[piece] || piece, 64, 64);
      
      const texture = new THREE.CanvasTexture(canvas);
      const labelGeom = new THREE.PlaneGeometry(PIECE_RADIUS * 1.5, PIECE_RADIUS * 0.6);
      const labelMat = new THREE.MeshBasicMaterial({ map: texture, transparent: true });
      const label = new THREE.Mesh(labelGeom, labelMat);
      label.position.y = PIECE_HEIGHT / 2 + 0.01;
      label.rotation.x = -Math.PI / 2;
      mesh.add(label);
      
      mesh.position.set(col, PIECE_HEIGHT / 2, row);
      mesh.castShadow = true;
      mesh.userData = { piece, col, row };
      
      return mesh;
    }
    
    function updateBoard(fen) {
      currentFen = fen;
      const rows = fen.split(' ')[0].split('/');
      
      // 清除旧棋子
      piecesGroup.clear();
      pieces = {};
      
      // 放置新棋子
      for (let r = 9; r >= 0; r--) {
        let col = 0;
        for (const char of rows[9 - r]) {
          if (char >= '1' && char <= '9') {
            col += parseInt(char);
          } else {
            const mesh = createPiece(char, col, r);
            piecesGroup.add(mesh);
            pieces[`${col},${r}`] = mesh;
            col++;
          }
        }
      }
    }
    
    function onResize() {
      const container = document.getElementById('canvas-container');
      camera.aspect = container.clientWidth / container.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(container.clientWidth, container.clientHeight);
    }
    
    function setupCameraControls() {
      let isDragging = false;
      let prevMouse = { x: 0, y: 0 };
      
      const canvas = document.getElementById('game-canvas');
      
      canvas.addEventListener('mousedown', (e) => {
        isDragging = true;
        prevMouse = { x: e.clientX, y: e.clientY };
      });
      
      canvas.addEventListener('mousemove', (e) => {
        if (!isDragging) return;
        
        const dx = e.clientX - prevMouse.x;
        const dy = e.clientY - prevMouse.y;
        
        // 旋转
        const spherical = new THREE.Spherical();
        spherical.setFromVector3(camera.position);
        spherical.theta -= dx * 0.01;
        spherical.phi -= dy * 0.01;
        spherical.phi = Math.max(0.2, Math.min(Math.PI / 2 - 0.1, spherical.phi));
        
        camera.position.setFromSpherical(spherical);
        camera.lookAt(4, 0, 4.5);
        
        prevMouse = { x: e.clientX, y: e.clientY };
      });
      
      canvas.addEventListener('mouseup', () => isDragging = false);
      canvas.addEventListener('mouseleave', () => isDragging = false);
      
      // 缩放
      canvas.addEventListener('wheel', (e) => {
        e.preventDefault();
        const distance = camera.position.length();
        const newDistance = Math.max(5, Math.min(25, distance + e.deltaY * 0.01));
        camera.position.normalize().multiplyScalar(newDistance);
      });
      
      // 重置视角按钮
      document.getElementById('btn-reset-camera').addEventListener('click', () => {
        camera.position.set(4, 10, 8);
        camera.lookAt(4, 0, 4.5);
      });
    }
    
    function animate() {
      requestAnimationFrame(animate);
      renderer.render(scene, camera);
    }
    
    // 分隔条拖动功能
    function setupResizer() {
      const resizer = document.getElementById('resizer');
      const sidePanel = document.getElementById('side-panel');
      let isResizing = false;
      
      resizer.addEventListener('mousedown', (e) => {
        isResizing = true;
        resizer.classList.add('active');
        document.body.style.cursor = 'col-resize';
        document.body.style.userSelect = 'none';
      });
      
      document.addEventListener('mousemove', (e) => {
        if (!isResizing) return;
        const newWidth = window.innerWidth - e.clientX;
        if (newWidth >= 200 && newWidth <= 600) {
          sidePanel.style.width = newWidth + 'px';
        }
      });
      
      document.addEventListener('mouseup', () => {
        if (isResizing) {
          isResizing = false;
          resizer.classList.remove('active');
          document.body.style.cursor = '';
          document.body.style.userSelect = '';
        }
      });
    }
    
    // 互换双方配置
    function swapAgents() {
      if (gameRunning) return; // 游戏运行时禁用
      
      // 互换 API Key
      const redKey = document.getElementById('red-api-key');
      const blackKey = document.getElementById('black-api-key');
      const tempKey = redKey.value;
      redKey.value = blackKey.value;
      blackKey.value = tempKey;
      
      // 互换 Model
      const redModel = document.getElementById('red-model');
      const blackModel = document.getElementById('black-model');
      const tempModel = redModel.value;
      redModel.value = blackModel.value;
      blackModel.value = tempModel;
      
      // 互换 Base URL
      const redUrl = document.getElementById('red-base-url');
      const blackUrl = document.getElementById('black-base-url');
      const tempUrl = redUrl.value;
      redUrl.value = blackUrl.value;
      blackUrl.value = tempUrl;
      
      // 更新预设按钮状态
      updatePresetButtonStates();
    }
    
    // 更新预设按钮状态
    function updatePresetButtonStates() {
      ['red', 'black'].forEach(agent => {
        const model = document.getElementById(`${agent}-model`).value;
        const baseUrl = document.getElementById(`${agent}-base-url`).value;
        
        document.querySelectorAll(`.provider-presets[data-agent="${agent}"] .preset-btn`).forEach(btn => {
          const provider = btn.dataset.provider;
          const preset = PRESETS[provider];
          const isActive = preset.model === model && preset.baseUrl === baseUrl;
          btn.classList.toggle('active', isActive);
        });
      });
    }
    
    // 预设按钮
    document.querySelectorAll('.preset-btn').forEach(btn => {
      btn.addEventListener('click', (e) => {
        const agent = e.target.closest('.provider-presets').dataset.agent;
        const provider = e.target.dataset.provider;
        const preset = PRESETS[provider];
        
        document.querySelectorAll(`.provider-presets[data-agent="${agent}"] .preset-btn`).forEach(b => {
          b.classList.toggle('active', b.dataset.provider === provider);
        });
        
        document.getElementById(`${agent}-model`).value = preset.model;
        document.getElementById(`${agent}-base-url`).value = preset.baseUrl;
      });
    });
    
    // 初始化 - 加载保存的配置
    async function initConfig() {
      try {
        const config = await window.electronAPI.getConfig();
        
        document.getElementById('red-model').value = config.redModel || '';
        document.getElementById('red-base-url').value = config.redBaseUrl || '';
        document.getElementById('black-model').value = config.blackModel || '';
        document.getElementById('black-base-url').value = config.blackBaseUrl || '';
        
        if (config.hasApiKeys) {
          document.getElementById('red-api-key').placeholder = '已保存（加密存储）';
          document.getElementById('black-api-key').placeholder = '已保存（加密存储）';
        }
      } catch (e) {
        console.error('加载配置失败:', e);
      }
    }
    
    // 启动游戏
    async function startGame() {
      const redKey = document.getElementById('red-api-key').value.trim();
      const blackKey = document.getElementById('black-api-key').value.trim();
      
      // 如果输入框为空但有保存的Key，需要提示用户重新输入
      // （安全设计：不会自动填充 Key，需要用户每次确认）
      if (!redKey || !blackKey) {
        showError('请填写 API Key');
        return;
      }
      
      // 保存配置（加密存储）
      try {
        await window.electronAPI.saveConfig({
          redApiKey: redKey,
          redModel: document.getElementById('red-model').value,
          redBaseUrl: document.getElementById('red-base-url').value,
          blackApiKey: blackKey,
          blackModel: document.getElementById('black-model').value,
          blackBaseUrl: document.getElementById('black-base-url').value,
        });
      } catch (e) {
        console.error('保存配置失败:', e);
      }
      
      // 连接 WebSocket
      const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
      
      ws.onopen = () => {
        document.getElementById('connection-status').textContent = '已连接';
        document.getElementById('connection-status').className = 'status-badge connected';
        
        const config = {
          red: {
            apiKey: redKey,
            model: document.getElementById('red-model').value || 'deepseek-chat',
            baseUrl: document.getElementById('red-base-url').value || 'https://api.deepseek.com',
          },
          black: {
            apiKey: blackKey,
            model: document.getElementById('black-model').value || 'deepseek-chat',
            baseUrl: document.getElementById('black-base-url').value || 'https://api.deepseek.com',
          }
        };
        
        ws.send(JSON.stringify({ type: 'start_game', config }));
      };
      
      ws.onmessage = (event) => {
        const data = JSON.parse(event.data);
        handleMessage(data);
      };
      
      ws.onclose = () => {
        document.getElementById('connection-status').textContent = '已断开';
        document.getElementById('connection-status').className = 'status-badge disconnected';
        gameRunning = false;
        document.getElementById('start-btn').style.display = 'block';
        document.getElementById('stop-btn').style.display = 'none';
      };
      
      gameRunning = true;
      document.getElementById('start-btn').style.display = 'none';
      document.getElementById('stop-btn').style.display = 'block';
    }
    
    function stopGame() {
      if (ws) ws.close();
    }
    
    function handleMessage(data) {
      switch (data.type) {
        case 'game_started':
          document.getElementById('turn-info').textContent = '🔴 红方 回合';
          updateBoard(data.fen);
          // 更新红方黑方状态显示
          document.querySelector('#red-player .player-model').textContent = data.red_model || '--';
          document.querySelector('#black-player .player-model').textContent = data.black_model || '--';
          // 重置请求计数
          redRequestCount = 0;
          blackRequestCount = 0;
          document.getElementById('red-stats').textContent = '请求次数: 0';
          document.getElementById('black-stats').textContent = '请求次数: 0';
          // 高亮红方表示先手
          document.getElementById('red-player').classList.add('active');
          document.getElementById('black-player').classList.remove('active');
          moveHistory = [];
          document.getElementById('move-history').textContent = '';
          document.getElementById('game-result').className = '';
          break;
          
        case 'move':
          updateBoard(data.fen);
          const turnText = data.move_by === 'Red' ? '🔴 红方' : '⚫ 黑方';
          document.getElementById('turn-info').textContent = `${turnText} 回合`;
          
          // 更新请求计数
          if (data.move_by === 'Red') {
            redRequestCount++;
            document.getElementById('red-stats').textContent = `请求次数: ${redRequestCount}`;
            document.getElementById('red-player').classList.add('active');
            document.getElementById('black-player').classList.remove('active');
          } else {
            blackRequestCount++;
            document.getElementById('black-stats').textContent = `请求次数: ${blackRequestCount}`;
            document.getElementById('black-player').classList.add('active');
            document.getElementById('red-player').classList.remove('active');
          }
          
          // 使用服务器发送的走步历史
          if (data.move_history && data.move_history.length > 0) {
            document.getElementById('move-history').textContent = data.move_history.join('\n');
          } else {
            // 备用：使用本地记录
            moveHistory.push(`${moveHistory.length + 1}. ${data.move_by}: ${data.move}`);
            document.getElementById('move-history').textContent = moveHistory.join('\n');
          }
          document.getElementById('move-history').scrollTop = document.getElementById('move-history').scrollHeight;
          break;
          
        case 'game_over':
          const winnerText = { red: '红方胜利', black: '黑方胜利', draw: '平局' }[data.result] || data.result;
          document.getElementById('turn-info').textContent = '🏁 游戏结束';
          document.getElementById('game-result').querySelector('.result-text').textContent = winnerText;
          document.getElementById('game-result').querySelector('.result-reason').textContent = data.reason || '';
          document.getElementById('game-result').className = 'show';
          break;
          
        case 'error':
          showError(data.message);
          break;
      }
    }
    
    function showError(msg) {
      const el = document.getElementById('error-message');
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 5000);
    }
    
    // 音效切换
    function toggleSound() {
      soundEnabled = !soundEnabled;
      const btn = document.getElementById('btn-toggle-sound');
      btn.textContent = soundEnabled ? '🔊 音效' : '🔇 静音';
    }
    
    // 帮助弹窗
    function showHelp() {
      const helpHtml = `
        <div style="color: #fff; line-height: 1.8;">
          <h3 style="color: #3498db; margin-bottom: 15px;">🎮 控制说明</h3>
          <p><strong>鼠标拖拽</strong> - 旋转视角</p>
          <p><strong>滚轮</strong> - 缩放视角</p>
          <p><strong>重置视角按钮</strong> - 恢复默认视角</p>
          <hr style="border-color: #333; margin: 15px 0;">
          <h3 style="color: #3498db; margin-bottom: 10px;">📝 游戏说明</h3>
          <p>红方先行，双方交替走步。</p>
          <p>AI根据当前局面分析并选择最佳走法。</p>
          <p>胜负判定：将军无法解除、困毙、超时。</p>
          <hr style="border-color: #333; margin: 15px 0;">
          <p style="color: #888; font-size: 11px;">提示：按住分隔条可拖动调整面板宽度</p>
        </div>
      `;
      const overlay = document.createElement('div');
      overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);z-index:9999;display:flex;align-items:center;justify-content:center;';
      overlay.onclick = () => overlay.remove();
      const modal = document.createElement('div');
      modal.style.cssText = 'background:#1a1a2e;padding:30px;border-radius:12px;max-width:400px;';
      modal.innerHTML = helpHtml;
      overlay.appendChild(modal);
      document.body.appendChild(overlay);
    }
    
    // AI日志面板 - 切换展开/折叠
    function toggleLogPanel(agent) {
      const content = document.getElementById(`${agent}-log-content`);
      const toggle = document.getElementById(`${agent}-log-toggle`);
      content.classList.toggle('show');
      toggle.textContent = content.classList.contains('show') ? '▲' : '▼';
    }
    
    // AI日志面板 - 添加日志条目
    function appendLogEntry(agent, role, content) {
      const logContent = document.getElementById(`${agent}-log-content`);
      const timestamp = new Date().toLocaleTimeString();
      const roleLabel = role === 'user' ? '📤 请求' : '📥 响应';
      const truncatedContent = content.length > 200 ? content.substring(0, 200) + '...' : content;
      logContent.innerHTML += `[${timestamp}] ${roleLabel}:\n${truncatedContent}\n\n`;
      logContent.scrollTop = logContent.scrollHeight;
    }
    
    // 初始化
    initScene();
    updateBoard(currentFen);
    initConfig(); // 加载保存的配置
    setupResizer(); // 初始化分隔条拖动
  </script>
</body>
</html>
